services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro,z

  monitor:
    build: .
    ports:
      - "8080:8080"
    environment:
      MQTT_BROKER_URL: tcp://mosquitto:1883
    depends_on:
      - mosquitto
